name: Pac-Man Contribution Graph

on:
  schedule:
    - cron: "0 0 * * *"  # Runs daily at midnight UTC
  workflow_dispatch:
    # Allows manual triggering
    inputs:
      force:
        description: 'Force run'
        required: false
        default: ''

jobs:
  generate-pacman:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Pac-Man SVG
        uses: platane/snk@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          output: pacman.svg

      - name: Commit and push Pac-Man SVG
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          git config --global user.name "$GIT_AUTHOR_NAME"
          git config --global user.email "$GIT_AUTHOR_EMAIL"
          # Create or switch to pacman-output branch
          if git rev-parse --verify pacman-output; then
            git checkout pacman-output
          else
            git checkout -b pacman-output
          fi
          git add pacman.svg
          git commit -m "Update Pac-Man contribution graph" || echo "No changes to commit"
          git push origin pacman-output --force
